<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Add Receipt</title>
</head>
<body>
<h1 th:text="${title}">Add Receipt</h1>

<form th:action="@{/receipts}" method="post">
    <p>
        Vendor:
        <input type="text" name="vendor" required>
    </p>
    <p>
        Amount:
        <input type="number" step="0.01" name="amount" required>
    </p>
    <p>
        Date (YYYY-MM-DD):
        <input type="text" name="date" placeholder="2026-03-15" required>
    </p>
    <p>
        Payment Type:
        <select name="paymentType">
            <option>Card</option>
            <option>Cash</option>
            <option>EBT</option>
        </select>
    </p>
    <p>
        Refund deadline (YYYY-MM-DD):
        <input type="text" name="refundDeadline" placeholder="2026-04-15" required>
    </p>
    <p>
        <button type="submit">Save</button>
    </p>
</form>

<p><a th:href="@{/receipts}">Back to receipts</a></p>
<p><a th:href="@{/}">Back to home</a></p>

</body>
</html>
