<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings — Receipt Tracker</title>
  <style>
    :root {
      --bg: #111110; --bg-alt: #1a1a18; --card: #1f1f1d;
      --accent: #f59e0b; --accent-soft: rgba(245,158,11,0.12);
      --text: #e8e6e1; --muted: #8a8680;
      --danger: #ef4444; --success: #4ade80;
      --border-soft: rgba(200,190,170,0.12);
    }
    body.theme-light {
      --bg: #e6e9ef; --bg-alt: #eff1f5; --card: #ffffff;
      --accent: #eab308; --accent-soft: rgba(234,179,8,0.12);
      --text: #4c4f69; --muted: #6b7280;
      --danger: #d20f39; --success: #16a34a;
      --border-soft: rgba(148,163,184,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; transition: background 0.3s, color 0.3s;
    }
    header {
      padding: 14px 32px; border-bottom: 1px solid var(--border-soft);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-alt); position: sticky; top: 0; z-index: 20;
    }
    .app-name { font-size: 16px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    nav a {
      color: var(--muted); text-decoration: none;
      font-size: 13px; margin-left: 20px; transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }
    .user-name { font-size: 13px; color: var(--muted); }
    .gear-btn {
      font-size: 18px; text-decoration: none;
      color: var(--accent); transition: transform 0.2s;
      display: inline-block;
    }
    .gear-btn:hover { transform: rotate(30deg); }
    .theme-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; padding: 5px 13px; border-radius: 999px;
      border: 1px solid var(--border-soft); background: transparent;
      color: var(--muted); cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
    .page { max-width: 560px; margin: 0 auto; padding: 48px 24px; }
    .page-kicker { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
    .page-title  { font-size: 28px; font-weight: 800; margin-bottom: 32px; }
    .settings-card {
      background: var(--card); border: 1px solid var(--border-soft);
      border-radius: 16px; overflow: hidden; margin-bottom: 16px;
    }
    .settings-section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted);
      padding: 16px 20px 8px; border-bottom: 1px solid var(--border-soft);
    }
    .field { padding: 20px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--muted); margin-bottom: 8px;
    }
    .field input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border-soft);
      background: var(--bg); color: var(--text);
      font-size: 14px; outline: none; transition: border-color 0.2s;
      font-family: inherit;
    }
    .field input:focus { border-color: var(--accent); }
    .field .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
    }
    .toggle-info { }
    .toggle-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
    .toggle-desc  { font-size: 12px; color: var(--muted); }
    .toggle-row input[type="checkbox"] {
      width: 20px; height: 20px; cursor: pointer;
      accent-color: var(--accent);
    }
    .divider { border: none; border-top: 1px solid var(--border-soft); }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 22px; border-radius: 999px;
      font-size: 13px; font-weight: 600;
      border: none; cursor: pointer; text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #111; }
    .btn-danger-outline {
      background: transparent; color: var(--danger);
      border: 1px solid rgba(239,68,68,0.4);
    }
    .btn-danger-outline:hover { background: rgba(239,68,68,0.08); }
    .btn-row { display: flex; gap: 10px; padding: 20px; }
    .success-msg {
      font-size: 13px; color: var(--success);
      padding: 0 20px 16px; display: none;
    }
  </style>
</head>
<body>
<header>
  <span class="app-name">🧾 Receipt Tracker</span>
  <div class="header-right">
    <nav>
      <a th:href="@{/}">Home</a>
      <a th:href="@{/receipts}">Receipts</a>
      <a th:href="@{/receipts/add}">+ Add Receipt</a>
    </nav>
    <span class="user-name" th:text="${displayName}">User</span>
    <a href="/settings" class="gear-btn" title="Settings">⚙️</a>
    <button class="theme-toggle" id="theme-toggle">
      <span id="theme-icon">🌙</span>
      <span id="theme-label">Dark</span>
    </button>
  </div>
</header>

<div class="page">
  <div class="page-kicker">CS 4800 Project</div>
  <div class="page-title">Settings</div>

  <!-- Profile -->
  <div class="settings-card">
    <div class="settings-section-label">Profile</div>
    <form th:action="@{/settings}" method="post" id="settings-form">
      <div class="field">
        <label>Display Name</label>
        <input type="text" name="displayName" maxlength="50"
               th:value="${displayName}" placeholder="Your name…" required/>
        <div class="hint">This is how your name appears across the app.</div>
      </div>
      <hr class="divider"/>

      <!-- Notifications -->
      <div class="settings-section-label" style="border-bottom:none;padding-bottom:0;">Notifications</div>
      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-title">Email Notifications</div>
          <div class="toggle-desc">Get reminders before refund deadlines expire</div>
        </div>
        <input type="checkbox" name="emailNotifications" id="email-notif"
               th:checked="${settings.emailNotifications}"/>
      </div>
      <hr class="divider"/>

      <div class="success-msg" id="success-msg">✓ Settings saved!</div>
      <div class="btn-row">
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>

  <!-- Account -->
  <div class="settings-card">
    <div class="settings-section-label">Account</div>
    <div class="toggle-row" style="flex-direction:column; align-items:flex-start; gap:4px;">
      <div class="toggle-title">Signed in as</div>
      <div class="toggle-desc" th:text="${userEmail}">email@gmail.com</div>
    </div>
    <hr class="divider"/>
    <div class="btn-row">
      <a href="/logout" class="btn btn-danger-outline">Sign Out</a>
    </div>
  </div>
</div>

<script>
  const toggle = document.getElementById('theme-toggle');
  const icon   = document.getElementById('theme-icon');
  const lbl    = document.getElementById('theme-label');
  function applyTheme(t) {
    if (t === 'light') { document.body.classList.add('theme-light'); icon.textContent='☀️'; lbl.textContent='Light'; }
    else { document.body.classList.remove('theme-light'); icon.textContent='🌙'; lbl.textContent='Dark'; }
  }
  applyTheme(localStorage.getItem('rt_theme') || 'dark');
  toggle.addEventListener('click', () => {
    const next = document.body.classList.contains('theme-light') ? 'dark' : 'light';
    applyTheme(next); localStorage.setItem('rt_theme', next);
  });
</script>
</body>
</html>
