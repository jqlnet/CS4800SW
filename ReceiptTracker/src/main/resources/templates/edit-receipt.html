<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title}">Edit Receipt</title>
  <style>
    :root {
      --bg:          #111110;
      --bg-alt:      #1a1a18;
      --card:        #1f1f1d;
      --accent:      #f59e0b;
      --accent-soft: rgba(245,158,11,0.12);
      --text:        #e8e6e1;
      --muted:       #8a8680;
      --danger:      #ef4444;
      --refunded:    #818cf8;
      --border-soft: rgba(200,190,170,0.12);
    }
    body.theme-light {
      --bg:          #e6e9ef;
      --bg-alt:      #eff1f5;
      --card:        #ffffff;
      --accent:      #eab308;
      --accent-soft: rgba(234,179,8,0.12);
      --text:        #4c4f69;
      --muted:       #6b7280;
      --danger:      #d20f39;
      --refunded:    #4f46e5;
      --border-soft: rgba(148,163,184,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; transition: background 0.3s, color 0.3s;
    }
    header {
      padding: 14px 32px; border-bottom: 1px solid var(--border-soft);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-alt); position: sticky; top: 0; z-index: 20;
    }
    .app-name { font-size: 16px; font-weight: 700; }
    nav a {
      color: var(--muted); text-decoration: none;
      font-size: 13px; margin-left: 20px; transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }
    .theme-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; padding: 5px 13px; border-radius: 999px;
      border: 1px solid var(--border-soft); background: transparent;
      color: var(--muted); cursor: pointer; margin-left: 20px;
      transition: border-color 0.2s, color 0.2s;
    }
    .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
    .page { max-width: 560px; margin: 0 auto; padding: 48px 24px; }
    .page-kicker { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
    .page-title  { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .page-sub    { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
    .form-card {
      background: var(--card); border: 1px solid var(--border-soft);
      border-radius: 16px; padding: 32px;
    }
    .field { margin-bottom: 22px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--muted); margin-bottom: 8px;
    }
    .field input, .field select, .field textarea {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border-soft);
      background: var(--bg); color: var(--text);
      font-size: 14px; outline: none; transition: border-color 0.2s;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
    .field textarea { resize: vertical; min-height: 80px; }
    .field .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .char-counter {
      display: flex; justify-content: flex-end;
      margin-top: 6px; font-size: 11px; color: var(--muted); transition: color 0.2s;
    }
    .char-counter.warning { color: var(--danger); }
    .divider { border: none; border-top: 1px solid var(--border-soft); margin: 24px 0; }
    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); margin-bottom: 16px;
    }
    /* Refunded toggle row */
    .refunded-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 10px;
      border: 1px solid var(--border-soft);
      background: var(--bg);
    }
    .refunded-row input[type="checkbox"] {
      width: 18px; height: 18px; cursor: pointer;
      accent-color: var(--refunded);
    }
    .refunded-row label {
      font-size: 13px; color: var(--text);
      cursor: pointer; margin: 0; text-transform: none;
      letter-spacing: 0; font-weight: 500;
    }
    .btn-row { display: flex; gap: 10px; margin-top: 8px; }
    .btn {
      flex: 1; padding: 11px 18px; border-radius: 999px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      border: none; cursor: pointer; text-align: center;
      transition: opacity 0.2s, transform 0.1s; display: inline-block;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #111; }
    .btn-outline {
      background: transparent; color: var(--text);
      border: 1px solid var(--border-soft);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
<header>
  <span class="app-name">🧾 Receipt Tracker</span>
  <div style="display:flex;align-items:center;">
    <nav>
      <a th:href="@{/}">Home</a>
      <a th:href="@{/receipts}">Receipts</a>
      <a th:href="@{/receipts/add}">+ Add Receipt</a>
    </nav>
    <button class="theme-toggle" id="theme-toggle">
      <span id="theme-icon">🌙</span>
      <span id="theme-label">Dark</span>
    </button>
  </div>
</header>

<div class="page">
  <div class="page-kicker">CS 4800 Project</div>
  <div class="page-title">Edit Receipt</div>
  <div class="page-sub">Update the details below and save your changes.</div>

  <div class="form-card">
    <form th:action="@{/receipts/update/{id}(id=${receipt.id})}" method="post" id="edit-form">

      <!-- ── Receipt Info ── -->
      <div class="section-label">Receipt Info</div>
      <div class="field">
        <label>Vendor</label>
        <input type="text" name="vendor" required th:value="${receipt.vendor}"/>
      </div>
      <div class="field">
        <label>Amount ($)</label>
        <input type="number" step="0.01" min="0" name="amount" required th:value="${receipt.amount}"/>
      </div>
      <div class="field">
        <label>Purchase Date</label>
        <input type="date" name="date" required th:value="${receipt.date}"/>
      </div>
      <div class="field">
        <label>Payment Type</label>
        <select name="paymentType">
          <option value="Card" th:selected="${receipt.paymentType == 'Card'}">Card</option>
          <option value="Cash" th:selected="${receipt.paymentType == 'Cash'}">Cash</option>
          <option value="EBT"  th:selected="${receipt.paymentType == 'EBT'}">EBT</option>
        </select>
      </div>

      <hr class="divider"/>

      <!-- ── Refund Deadline ── -->
      <div class="section-label">Refund Deadline</div>
      <div class="field">
        <label>Refund Deadline Date</label>
        <input type="date" name="refundDeadline" required th:value="${receipt.refundDeadline}"/>
        <div class="hint">Set this directly — no auto-calculation on edit.</div>
      </div>

      <hr class="divider"/>

      <!-- ── Item Description ── -->
      <div class="section-label">Item Description</div>
      <div class="field">
        <label>Description
          <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span>
        </label>
        <textarea name="description" id="description" maxlength="150"
                  th:text="${receipt.description}"></textarea>
        <div class="char-counter" id="char-counter">0 / 150</div>
      </div>

      <hr class="divider"/>

      <!-- ── Refund Status ── -->
      <div class="section-label">Refund Status</div>
      <div class="refunded-row">
        <input type="checkbox" name="refunded" id="refunded-check"
               th:checked="${receipt.refunded}"/>
        <label for="refunded-check">Mark this receipt as refunded</label>
      </div>

      <div style="margin-top: 24px;">
        <div class="btn-row">
          <a th:href="@{/receipts}" class="btn btn-outline">Cancel</a>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
  const toggle = document.getElementById('theme-toggle');
  const icon   = document.getElementById('theme-icon');
  const lbl    = document.getElementById('theme-label');
  function applyTheme(t) {
    if (t === 'light') { document.body.classList.add('theme-light'); icon.textContent='☀️'; lbl.textContent='Light'; }
    else { document.body.classList.remove('theme-light'); icon.textContent='🌙'; lbl.textContent='Dark'; }
  }
  applyTheme(localStorage.getItem('rt_theme') || 'dark');
  toggle.addEventListener('click', () => {
    const next = document.body.classList.contains('theme-light') ? 'dark' : 'light';
    applyTheme(next); localStorage.setItem('rt_theme', next);
  });

  const descArea    = document.getElementById('description');
  const charCounter = document.getElementById('char-counter');
  function updateCounter() {
    const len = descArea.value.length;
    charCounter.textContent = `${len} / 150`;
    charCounter.classList.toggle('warning', len >= 140);
  }
  descArea.addEventListener('input', updateCounter);
  updateCounter();
</script>
</body>
</html>
