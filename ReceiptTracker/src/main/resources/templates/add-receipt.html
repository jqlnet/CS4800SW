<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title}">Add Receipt</title>
  <style>
    :root {
      --bg:          #111110;
      --bg-alt:      #1a1a18;
      --card:        #1f1f1d;
      --accent:      #f59e0b;
      --accent-soft: rgba(245,158,11,0.12);
      --text:        #e8e6e1;
      --muted:       #8a8680;
      --border-soft: rgba(200,190,170,0.12);
    }
    body.theme-light {
      --bg:          #e6e9ef;
      --bg-alt:      #eff1f5;
      --card:        #ffffff;
      --accent:      #eab308;
      --accent-soft: rgba(234,179,8,0.12);
      --text:        #4c4f69;
      --muted:       #6b7280;
      --border-soft: rgba(148,163,184,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; transition: background 0.3s, color 0.3s;
    }
    header {
      padding: 14px 32px; border-bottom: 1px solid var(--border-soft);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-alt); position: sticky; top: 0; z-index: 20;
    }
    .app-name { font-size: 16px; font-weight: 700; }
    nav a {
      color: var(--muted); text-decoration: none;
      font-size: 13px; margin-left: 20px; transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }
    .theme-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; padding: 5px 13px; border-radius: 999px;
      border: 1px solid var(--border-soft); background: transparent;
      color: var(--muted); cursor: pointer; margin-left: 20px;
      transition: border-color 0.2s, color 0.2s;
    }
    .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
    .page { max-width: 560px; margin: 0 auto; padding: 48px 24px; }
    .page-kicker { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
    .page-title  { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .page-sub    { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
    .form-card {
      background: var(--card); border: 1px solid var(--border-soft);
      border-radius: 16px; padding: 32px;
    }
    .field { margin-bottom: 22px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--muted); margin-bottom: 8px;
    }
    .field input, .field select {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border-soft);
      background: var(--bg); color: var(--text);
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }
    .field .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* custom days input — hidden by default */
    .custom-days-wrap {
      margin-top: 10px;
      display: none;
    }
    .custom-days-wrap.visible { display: block; }
    .custom-days-wrap input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border-soft);
      background: var(--bg); color: var(--text);
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .custom-days-wrap input:focus { border-color: var(--accent); }
    .custom-days-wrap input::placeholder { color: var(--muted); }

    .btn-row { display: flex; gap: 10px; margin-top: 8px; }
    .btn {
      flex: 1; padding: 11px 18px; border-radius: 999px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      border: none; cursor: pointer; text-align: center;
      transition: opacity 0.2s, transform 0.1s; display: inline-block;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #111; }
    .btn-outline {
      background: transparent; color: var(--text);
      border: 1px solid var(--border-soft);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
<header>
  <span class="app-name">🧾 Receipt Tracker</span>
  <div style="display:flex;align-items:center;">
    <nav>
      <a th:href="@{/}">Home</a>
      <a th:href="@{/receipts}">Receipts</a>
      <a th:href="@{/receipts/add}">+ Add Receipt</a>
    </nav>
    <button class="theme-toggle" id="theme-toggle">
      <span id="theme-icon">🌙</span>
      <span id="theme-label">Dark</span>
    </button>
  </div>
</header>

<div class="page">
  <div class="page-kicker">CS 4800 Project</div>
  <div class="page-title">Add a Receipt</div>
  <div class="page-sub">Fill in the details below. The refund deadline will be calculated from the purchase date.</div>

  <div class="form-card">
    <form th:action="@{/receipts}" method="post" id="receipt-form">
      <div class="field">
        <label>Vendor</label>
        <input type="text" name="vendor" required placeholder="Target, Walmart, Amazon…"/>
      </div>
      <div class="field">
        <label>Amount ($)</label>
        <input type="number" step="0.01" min="0" name="amount" required placeholder="0.00"/>
      </div>
      <div class="field">
        <label>Purchase Date</label>
        <input type="date" name="date" required/>
      </div>
      <div class="field">
        <label>Payment Type</label>
        <select name="paymentType">
          <option>Card</option>
          <option>Cash</option>
          <option>EBT</option>
        </select>
      </div>
      <div class="field">
        <label>Refund Window</label>
        <select name="refundWindowPreset" id="refund-preset">
          <option value="30">30 days</option>
          <option value="60">60 days</option>
          <option value="90">90 days</option>
          <option value="custom">Custom</option>
        </select>
        <div class="custom-days-wrap" id="custom-days-wrap">
          <input type="number" name="customDays" id="custom-days-input"
                 min="1" max="365" placeholder="Enter number of days…"/>
        </div>
        <div class="hint">Refund deadline = purchase date + selected days</div>
      </div>
      <div class="btn-row">
        <a th:href="@{/receipts}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Receipt</button>
      </div>
    </form>
  </div>
</div>

<script>
  /* ── Theme ── */
  const toggle = document.getElementById('theme-toggle');
  const icon   = document.getElementById('theme-icon');
  const lbl    = document.getElementById('theme-label');
  function applyTheme(t) {
    if (t === 'light') { document.body.classList.add('theme-light'); icon.textContent='☀️'; lbl.textContent='Light'; }
    else { document.body.classList.remove('theme-light'); icon.textContent='🌙'; lbl.textContent='Dark'; }
  }
  applyTheme(localStorage.getItem('rt_theme') || 'dark');
  toggle.addEventListener('click', () => {
    const next = document.body.classList.contains('theme-light') ? 'dark' : 'light';
    applyTheme(next); localStorage.setItem('rt_theme', next);
  });

  /* ── Refund window toggle ── */
  const preset      = document.getElementById('refund-preset');
  const customWrap  = document.getElementById('custom-days-wrap');
  const customInput = document.getElementById('custom-days-input');

  preset.addEventListener('change', () => {
    if (preset.value === 'custom') {
      customWrap.classList.add('visible');
      customInput.required = true;
    } else {
      customWrap.classList.remove('visible');
      customInput.required = false;
      customInput.value = '';
    }
  });

  /* ── Validate custom days before submit ── */
  document.getElementById('receipt-form').addEventListener('submit', (e) => {
    if (preset.value === 'custom' && (!customInput.value || customInput.value < 1)) {
      e.preventDefault();
      customInput.focus();
      customInput.style.borderColor = 'var(--danger)';
    }
  });
</script>
</body>
</html>
